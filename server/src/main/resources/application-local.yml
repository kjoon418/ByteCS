# local 프로파일: Docker 없이 서버를 띄워 스모크 테스트하기 위한 설정.
# 운영 기본(application.yml)은 Postgres를 유지하며, 이 프로파일에서만 인메모리 H2를 쓴다.
# 실행: ./gradlew :server:bootRun --args='--spring.profiles.active=local'
# test 프로파일이 아니므로 ProblemDataLoader(@Profile("!test"))가 동작해 시드 문제가 채워진다.
spring:
  datasource:
    url: jdbc:h2:mem:bytecs;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
  flyway:
    # 마이그레이션은 운영(Postgres) 전용이다. local은 인메모리 H2를 create-drop으로 매 기동 초기화한다.
    enabled: false

# 면접 설명 채점(C3): 로컬은 기본으로 무료·오프라인 Fake 채점기를 쓴다(AI API 비용 0 — 오너 최우선 요구 2026-07-24).
# 실 AI 경로를 비용 없이 검증하려면 provider를 http로 바꾸고 로컬 CLI LLM(OpenAI 호환)을 가리키면 된다. 예(Ollama):
#   ./gradlew :server:bootRun --args='--spring.profiles.active=local' 로 띄우기 전에 아래를 켠다.
#   (Ollama라면 `ollama serve` + `ollama pull qwen2.5` 후 아래 주석 해제)
# bytecs:
#   interview:
#     judge:
#       provider: http
#       base-url: http://localhost:11434/v1   # Ollama의 OpenAI 호환 엔드포인트
#       model: qwen2.5
#       # api-key 없음 — 로컬 CLI LLM은 인증이 필요 없다.
