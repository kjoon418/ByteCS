# tester 프로파일: 테스터 피드백용 무료 배포(Render 웹 서비스 + Neon Postgres) 환경.
# 실서비스가 아니다 — 시드 즉시 승인(APPROVED) 투입이 허용되는 유일한 배포 환경(오너 결정 2026-07-20).
#
# datasource·JWT·관리자 부트스트랩은 기본(application.yml)의 환경변수 주입을 그대로 쓴다.
#   - DB_URL 예(Neon): jdbc:postgresql://<host>/<db>?sslmode=require
#   - JWT_SECRET: 반드시 강한 키를 새로 주입한다(yml 기본값은 로컬 개발 전용).
# 스키마는 운영과 동일하게 Flyway 마이그레이션이 만들고, ddl-auto=validate(기본)로 검증만 한다.
#
# ProblemDataLoader(@Profile("local", "tester"))가 기동 시 문제 0건일 때
# 테스터용 큐레이션 시드(seed/problems-generated.json)를 채운다.

# 면접 설명 채점(C3): 실 AI를 저비용 클라우드 모델로 붙인다(오너 결정 2026-07-24 — 큐레이터 합격 검토가 별도로 있어
# 채점 모델 성능 요구가 낮음). Gemini의 OpenAI 호환 엔드포인트를 쓰므로 공급자 중립 어댑터가 그대로 붙는다.
#   - BYTECS_INTERVIEW_JUDGE_API_KEY: Gemini API 키. 미주입 시 채점은 항상 폴백(모범 설명 공개·준비도 미갱신)으로 흐른다(무크래시).
#   - 다른 저비용 공급자로 바꾸려면 base-url·model만 교체한다(코드 무변경).
# 면접 이용 정책(테스터 공개 기간 임시 완화, 2026-07-24 오너 결정): 테스터에게 면접 기능을 넓게 노출·피드백받기 위해
# 회원 전용을 풀고(게스트도 이용) 하루 세션 수 제한을 사실상 무제한으로 둔다. 되돌릴 땐 이 policy 블록만 지우면 된다(코드 무변경).
bytecs:
  interview:
    policy:
      member-only: false
      daily-quota: 100000
    judge:
      provider: http
      base-url: ${BYTECS_INTERVIEW_JUDGE_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      # 구세대 모델(gemini-2.0-flash·2.5-flash-lite)은 "신규 사용자에겐 사용 불가"로 404 → 신규 프로젝트도 늘 쓸 수 있는
      # 현행 추적 별칭 gemini-flash-lite-latest(저비용 flash-lite)로 둔다. 별칭이라 모델 퇴역/신규차단으로 다시 막힐 일이 없다.
      # 다른 모델을 고정하고 싶으면 env BYTECS_INTERVIEW_JUDGE_MODEL로 덮어쓴다(실패 시 status=404 body 로그로 사유 확인).
      model: ${BYTECS_INTERVIEW_JUDGE_MODEL:gemini-flash-lite-latest}
      api-key: ${BYTECS_INTERVIEW_JUDGE_API_KEY:}
