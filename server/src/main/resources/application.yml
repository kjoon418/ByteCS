spring:
  application:
    name: bytecs-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bytecs}
    username: ${DB_USERNAME:bytecs}
    password: ${DB_PASSWORD:bytecs}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 스키마의 단일 출처는 Flyway 마이그레이션(classpath:db/migration)이다.
      # 운영 DB에 관리자가 축적하는 콘텐츠는 재생성 불가능한 자산이므로, Hibernate는 매핑-스키마 일치 검증만 한다.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# 관리자 계정 부트스트랩. 두 값을 모두 주입해 기동하면 해당 이메일의 관리자 계정이 없을 때 생성한다.
# 둘 다 비워 두면 관리자 기능이 잠긴 채 기동한다(AdminAccountBootstrap 참고).
bytecs:
  admin:
    email: ${BYTECS_ADMIN_EMAIL:}
    password: ${BYTECS_ADMIN_PASSWORD:}

# JWT 서명 키·만료. 운영에서는 반드시 JWT_SECRET 환경변수로 강한 키를 주입한다.
# 기본값은 로컬 개발 편의용이며, HS256에 필요한 최소 256비트(32바이트) 이상 길이를 만족한다.
jwt:
  secret: ${JWT_SECRET:bytecs-local-dev-secret-key-please-change-in-production-0123456789}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
