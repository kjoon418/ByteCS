<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS한입 관리자 로그인</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f5f6f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        main { background: #fff; border: 1px solid #e2e4e8; border-radius: 12px; padding: 32px; width: 320px; }
        h1 { font-size: 1.2rem; margin: 0 0 20px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 12px; color: #333; }
        input { display: block; width: 100%; box-sizing: border-box; margin-top: 4px; padding: 8px; border: 1px solid #ccd0d6; border-radius: 6px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 6px; background: #2b6cb0; color: #fff; font-size: 0.95rem; cursor: pointer; }
        .notice { font-size: 0.85rem; margin: 0 0 12px; }
        .error { color: #c0392b; }
    </style>
</head>
<body>
<main>
    <h1>CS한입 관리자</h1>
    <p class="notice error" th:if="${param.error}">이메일 또는 비밀번호가 올바르지 않습니다.</p>
    <p class="notice" th:if="${param.logout}">로그아웃되었습니다.</p>
    <form th:action="@{/admin/login}" method="post">
        <label>이메일
            <input type="email" name="username" required autofocus autocomplete="username">
        </label>
        <label>비밀번호
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">로그인</button>
    </form>
</main>
</body>
</html>
