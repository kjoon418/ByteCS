<html>
        <head>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
            <style> * { font-family: 'Pretendard', sans-serif; } </style>
        </head>

        
<div class="ui-screen">
    <div id="app" class="relative w-[390px] min-min-h-[840px] bg-white flex flex-col font-sans">
    <!-- Header Section -->
    <header id="header" class="sticky top-0 z-10 bg-white/80 backdrop-blur-md px-5 py-4 flex items-center justify-between">
        <button class="w-10 h-10 flex items-center justify-start text-gray-800">
            <i class="fa-solid fa-chevron-left text-xl"></i>
        </button>
        <h1 class="text-lg font-bold text-gray-900">시작하기</h1>
        <div class="w-10"></div>
    </header>

    <!-- Content Body -->
    <main id="content" class="flex-1 px-6 pt-6 pb-32">
        <!-- Value Proposition -->
        <section id="hero-section" class="mb-8">
            <div class="mb-4">
                <div class="relative w-16 h-16 rounded-2xl shadow-sm">  <img class="w-full h-full object-cover" src="https://gmcnqdpighpxhzpesqwf.supabase.co/storage/v1/object/public/generated-images/image-3ec56514-6d50-4b3e-8141-bf3344db6657.jpg" alt="App logo or secure cloud icon representing data safety" /></div>
            </div>
            <h2 class="text-2xl font-bold leading-tight text-gray-900 mb-2">
                가입하면 학습 기록이<br/>안전하게 보호됩니다
            </h2>
            <p class="text-gray-500 text-[15px] leading-relaxed">
                어느 기기에서든 로그인만 하세요.<br/>지금까지의 모든 성과가 그대로 이어집니다.
            </p>
        </section>

        <!-- Migration Assurance Banner -->
        <section id="migration-banner" class="mb-10 bg-blue-50 border border-blue-100 rounded-2xl p-4 flex items-start gap-3">
            <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-sync text-white text-xs"></i>
            </div>
            <div>
                <p class="text-blue-900 font-semibold text-sm mb-0.5">기록 승계 준비 완료</p>
                <p class="text-blue-700 text-xs leading-snug">
                    게스트로 학습한 12개의 기록이<br/>새 계정으로 안전하게 옮겨집니다.
                </p>
            </div>
        </section>

        <!-- Social Authentication Buttons -->
        <section id="social-auth" class="space-y-3 mb-8">
            <button class="w-full h-[56px] bg-[#FEE500] text-[#191919] rounded-xl flex items-center justify-center gap-3 font-semibold text-[15px]">
                <i class="fa-solid fa-comment text-lg"></i>
                카카오로 시작하기
            </button>
            <button class="w-full h-[56px] bg-black text-white rounded-xl flex items-center justify-center gap-3 font-semibold text-[15px]">
                <i class="fa-brands fa-apple text-xl"></i>
                Apple로 시작하기
            </button>
            <button class="w-full h-[56px] bg-white border border-gray-200 text-gray-700 rounded-xl flex items-center justify-center gap-3 font-semibold text-[15px]">
                <i class="fa-brands fa-google text-lg"></i>
                Google로 시작하기
            </button>
        </section>

        <!-- Divider -->
        <div id="divider" class="flex items-center gap-4 mb-8">
            <div class="flex-1 h-[1px] bg-gray-100"></div>
            <span class="text-xs text-gray-400 font-medium uppercase tracking-wider">또는 이메일로 가입</span>
            <div class="flex-1 h-[1px] bg-gray-100"></div>
        </div>

        <!-- Email Form -->
        <section id="email-form" class="space-y-5">
            <div class="group">
                <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">이메일 주소</label>
                <div class="relative">
                    <input type="email" placeholder="example@email.com" class="w-full h-14 bg-gray-50 border border-gray-100 rounded-xl px-4 text-[15px] focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all" value="vinsign@design.com">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-green-500">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                </div>
                <p class="mt-2 ml-1 text-[13px] text-green-600 font-medium">사용 가능한 이메일입니다.</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">비밀번호</label>
                <div class="relative">
                    <input type="password" placeholder="8자 이상 입력해주세요" class="w-full h-14 bg-gray-50 border border-gray-100 rounded-xl px-4 text-[15px] focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
                    <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Switch Mode -->
        <div id="auth-switch" class="mt-8 text-center">
            <p class="text-gray-500 text-sm">
                이미 계정이 있으신가요? 
                <button class="text-blue-600 font-bold ml-1 hover:underline">로그인</button>
            </p>
        </div>
    </main>

    <!-- Footer Action Area -->
    <footer id="footer-action" class="absolute bottom-0 left-0 w-full px-6 pb-10 pt-4 bg-gradient-to-t from-white via-white to-transparent">
        <button id="cta-button" class="w-full h-16 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-xl shadow-blue-100 active:scale-[0.98] transition-transform">
            가입하고 기록 저장하기
        </button>
        <p id="terms-notice" class="mt-5 text-center text-[11px] text-gray-400 leading-relaxed">
            가입 시 <span class="underline">이용약관</span> 및 <span class="underline">개인정보처리방침</span>에 동의하게 됩니다.<br/>
            학습 기록은 2026.01 기준으로 안전하게 암호화되어 저장됩니다.
        </p>
    </footer>

    <!-- Floating Error Guide (Hidden by default, shown for context) -->
    <div id="error-guide" class="hidden absolute top-20 left-1/2 -translate-x-1/2 w-[342px] bg-white border border-red-100 shadow-2xl rounded-2xl p-4 flex items-center gap-3">
        <div class="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-circle-exclamation text-lg"></i>
        </div>
        <div class="flex-1">
            <p class="text-gray-900 font-bold text-sm">시간이 지나 로그아웃됐어요</p>
            <p class="text-gray-500 text-xs">학습 기록은 안전해요. 다시 로그인해주세요.</p>
        </div>
    </div>
</div>
</div>

</html>
