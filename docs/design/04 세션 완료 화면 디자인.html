<html>
        <head>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
            <style> * { font-family: 'Pretendard', sans-serif; } </style>
        </head>

        
<div class="ui-screen">
    <div id="app" class="relative w-[390px] min-min-h-[840px] bg-white flex flex-col">
    <div id="celebration-section" class="pt-16 pb-8 px-6 flex flex-col items-center text-center">
        <div class="relative mb-6">
            <div class="absolute inset-0 bg-blue-100 rounded-full scale-110 animate-pulse opacity-50"></div>
            <div class="relative w-24 h-24 bg-emerald-600 rounded-full flex items-center justify-center shadow-lg shadow-emerald-200">
                <i class="fa-solid fa-check text-4xl text-white"></i>
            </div>
            <div class="absolute -bottom-1 -left-4 text-blue-400 text-lg">
                <i class="fa-solid fa-star"></i>
            </div>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">오늘 CS 한입 완료!</h1>
        <p class="text-gray-500 text-sm leading-relaxed">
            오늘도 성실하게 지식을 채웠군요.<br>
            작은 습관이 당신을 전문가로 만듭니다.
        </p>
    </div>

    <div id="summary-cards" class="px-6 space-y-4">
        <div id="stats-card" class="bg-slate-50 rounded-2xl p-5 flex justify-around items-center border border-slate-100">
            <div class="text-center">
                <div class="text-xs text-gray-400 mb-1">푼 문제</div>
                <div class="text-xl font-bold text-gray-800">10<span class="text-sm font-medium ml-0.5">개</span></div>
            </div>
            <div class="w-px h-8 bg-slate-200"></div>
            <div class="text-center">
                <div class="text-xs text-gray-400 mb-1">새 개념</div>
                <div class="text-xl font-bold text-gray-800">2<span class="text-sm font-medium ml-0.5">개</span></div>
            </div>
            <div class="w-px h-8 bg-slate-200"></div>
            <div class="text-center">
                <div class="text-xs text-gray-400 mb-1">복습</div>
                <div class="text-xl font-bold text-gray-800">1<span class="text-sm font-medium ml-0.5">개</span></div>
            </div>
        </div>

        <div id="streak-card" class="bg-orange-50 rounded-2xl p-5 flex items-center border border-orange-100">
            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-sm mr-4">
                <i class="fa-solid fa-fire text-orange-500 text-xl"></i>
            </div>
            <div class="flex-1">
                <div class="text-xs text-orange-600 font-semibold mb-0.5">연속 학습 달성 중</div>
                <div class="text-base font-bold text-gray-800">벌써 3일째 꾸준히 하고 있어요!</div>
            </div>
        </div>

        <div id="review-info-card" class="bg-blue-50 rounded-2xl p-5 flex items-center border border-blue-100">
            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-sm mr-4">
                <i class="fa-solid fa-brain text-blue-500 text-xl"></i>
            </div>
            <div class="flex-1">
                <div class="text-xs text-blue-600 font-semibold mb-0.5">다시 만나요</div>
                <div class="text-base font-bold text-gray-800">배운 내용은 나중에 복습으로 다시 만나요</div>
            </div>
        </div>
    </div>

    <div class="flex-1"></div>

    <div id="action-buttons" class="p-6 space-y-3">
        <button class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-base shadow-lg shadow-blue-100 active:scale-[0.98] transition-transform">
            오늘은 여기까지
        </button>
        <button class="w-full py-4 bg-slate-100 text-gray-700 rounded-2xl font-semibold text-base active:scale-[0.98] transition-transform">
            조금 더 풀기
        </button>
    </div>

    <div id="bottom-safe-area" class="h-8"></div>
</div>
</div>

</html>
