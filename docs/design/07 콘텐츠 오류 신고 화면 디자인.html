<html>
        <head>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
            <style> * { font-family: 'Pretendard', sans-serif; } </style>
        </head>

        
<div class="ui-screen">
    <div id="app" class="relative w-[390px] min-min-h-[840px] bg-slate-50 font-sans">
    <!-- Problem Solving Background Context -->
    <div id="problem-context" class="w-full p-6 opacity-40 pointer-events-none">
        <header id="context-header" class="flex items-center justify-between mb-8">
            <i class="fa-solid fa-chevron-left text-xl text-slate-800"></i>
            <div class="flex flex-col items-center">
                <span class="text-xs font-bold text-blue-600 tracking-widest">UNIT 03</span>
                <h1 class="text-sm font-medium text-slate-500">기초 미적분학의 이해</h1>
            </div>
            <i class="fa-solid fa-ellipsis-vertical text-xl text-slate-800"></i>
        </header>

        <div id="context-problem" class="space-y-6">
            <div class="flex items-center gap-2">
                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded">Q. 12</span>
                <span class="text-slate-400 text-xs">정답률 64%</span>
            </div>
            <p class="text-lg font-bold text-slate-800 leading-relaxed">
                다음 함수 f(x) = 2x³ - 3x² + 6에서 x=1일 때의 미분계수를 구하시오.
            </p>
            <div class="space-y-3">
                <div class="w-full p-4 border border-slate-200 rounded-2xl bg-white text-slate-800 font-medium">1) 0</div>
                <div class="w-full p-4 border border-blue-500 rounded-2xl bg-blue-50 text-blue-700 font-bold">2) 3</div>
                <div class="w-full p-4 border border-slate-200 rounded-2xl bg-white text-slate-800 font-medium">3) 6</div>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet Overlay -->
    <div id="modal-overlay" class="absolute inset-0 bg-slate-900/60 z-10"></div>

    <!-- Content Error Report Bottom Sheet -->
    <div id="report-sheet" class="absolute bottom-0 w-full bg-white rounded-t-[32px] z-20 shadow-2xl animate-in slide-in-from-bottom duration-300">
        <!-- Handle Bar -->
        <div class="flex justify-center pt-3 pb-2">
            <div class="w-10 h-1.5 bg-slate-200 rounded-full"></div>
        </div>

        <div class="px-6 pt-2 pb-8">
            <!-- Header -->
            <div id="report-header" class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">콘텐츠 오류 신고</h2>
                    <p class="text-sm text-slate-500 mt-1">발견하신 오류를 알려주시면 빠르게 수정할게요.</p>
                </div>
                <button class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-400">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Report Type Selection -->
            <div id="report-options" class="space-y-3 mb-8">
                <label class="flex items-center justify-between p-4 border-2 border-blue-600 bg-blue-50 rounded-2xl cursor-pointer transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full border-2 border-blue-600 flex items-center justify-center">
                            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>
                        </div>
                        <span class="font-bold text-blue-700">정답이 틀려요</span>
                    </div>
                    <i class="fa-solid fa-check text-blue-600"></i>
                </label>

                <label class="flex items-center justify-between p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full border-2 border-slate-200"></div>
                        <span class="font-medium text-slate-700">해설/힌트에 오류가 있어요</span>
                    </div>
                </label>

                <label class="flex items-center justify-between p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full border-2 border-slate-200"></div>
                        <span class="font-medium text-slate-700">오타나 맞춤법이 틀려요</span>
                    </div>
                </label>

                <label class="flex items-center justify-between p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full border-2 border-slate-200"></div>
                        <span class="font-medium text-slate-700">이미지가 보이지 않아요</span>
                    </div>
                </label>
            </div>

            <!-- Additional Explanation -->
            <div id="report-input-group" class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-2 px-1">상세 내용 (선택)</label>
                <textarea 
                    placeholder="오류에 대해 더 자세히 알려주세요..." 
                    class="w-full h-28 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all resize-none"
                ></textarea>
            </div>

            <!-- Primary CTA -->
            <button id="report-submit" class="w-full py-5 bg-slate-900 text-white font-bold rounded-2xl shadow-lg shadow-slate-200 active:scale-[0.98] transition-transform">
                신고 보내기
            </button>
        </div>
    </div>

    <!-- Success Toast (Hidden by default, shown here for visual representation) -->
    <div id="success-toast" class="absolute top-12 left-1/2 -translate-x-1/2 w-[342px] bg-white shadow-xl rounded-2xl p-4 flex items-center gap-3 border border-emerald-100 z-30 animate-in fade-in slide-in-from-top-4 duration-500">
        <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 shrink-0">
            <i class="fa-solid fa-circle-check text-lg"></i>
        </div>
        <div class="flex-1">
            <h4 class="text-sm font-bold text-slate-900">알려주셔서 고마워요!</h4>
            <p class="text-xs text-slate-500">큐레이터가 확인 후 빠르게 반영할게요.</p>
        </div>
        <button class="text-slate-300 hover:text-slate-500 px-1">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Curator Insight Tag (Domain context) -->
    <div id="curator-badge" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 pointer-events-none opacity-0">
        <div class="px-3 py-1 bg-slate-800/80 backdrop-blur-sm text-[10px] text-white rounded-full flex items-center gap-1.5">
            <i class="fa-solid fa-shield-halved text-blue-400"></i>
            <span>콘텐츠 신뢰성 가드레일 작동 중</span>
        </div>
    </div>
</div>
</div>

</html>
