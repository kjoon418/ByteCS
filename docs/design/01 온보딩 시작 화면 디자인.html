<html>
        <head>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
            <style> * { font-family: 'Pretendard', sans-serif; } </style>
        </head>

        
<div class="ui-screen">
    <div id="app" class="relative w-[390px] min-min-h-[840px] bg-white flex flex-col justify-between">
    <!-- Header Logo Section -->
    <div id="header" class="pt-16 px-8 flex flex-col items-center">
        <div id="logo-container" class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-100 mb-4">
            <i class="fa-solid fa-code-branch text-3xl text-white"></i>
        </div>
        <h1 id="brand-name" class="text-2xl font-bold text-slate-900 tracking-tight">CS한입</h1>
        <span id="brand-subtitle" class="text-sm font-medium text-slate-400 uppercase tracking-widest">ByteCS</span>
    </div>

    <!-- Main Visual Metaphor -->
    <div id="visual-section" class="px-8 flex justify-center">
        <div class="relative w-full aspect-square flex items-center justify-center">
            <!-- Decorative Background Elements -->
            <div class="absolute w-64 h-64 bg-blue-50 rounded-full blur-3xl opacity-60"></div>
            <div class="w-72 h-72 relative z-10">  <img class="w-full h-full object-contain" src="https://gmcnqdpighpxhzpesqwf.supabase.co/storage/v1/object/public/generated-images/image-fe56120f-dd37-4408-a837-c954a5b03f2b.jpg" alt="A minimalist and modern 3D illustration of a digital snack box containing glowing code blocks and binary symbols, soft blue and purple lighting, clean claymorphism style" /></div>
        </div>
    </div>

    <!-- Content Section -->
    <div id="content-section" class="px-8 text-center">
        <h2 id="value-proposition" class="text-2xl font-bold text-slate-900 leading-snug mb-3">
            5분이면 CS 한입,<br/>오늘도 가볍게 채워보세요.
        </h2>
        <p id="sub-description" class="text-slate-500 text-[15px] leading-relaxed">
            복잡한 전공 지식을 핵심만 쏙쏙,<br/>
            부담 없이 시작하는 IT 지식 습관
        </p>
        
        <!-- Quick Feature Points -->
        <div id="feature-points" class="flex justify-center gap-6 mt-8">
            <div class="flex flex-col items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-blue-500"></i>
                </div>
                <span class="text-xs font-medium text-slate-600">핵심 요약</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center">
                    <i class="fa-solid fa-check-double text-blue-500"></i>
                </div>
                <span class="text-xs font-medium text-slate-600">데일리 퀴즈</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center">
                    <i class="fa-solid fa-chart-line text-blue-500"></i>
                </div>
                <span class="text-xs font-medium text-slate-600">성장 리포트</span>
            </div>
        </div>
    </div>

    <!-- Action Section -->
    <div id="action-section" class="px-6 pb-12 pt-8 flex flex-col gap-4">
        <div id="primary-cta-container">
            <button id="btn-guest-start" class="w-full h-[60px] bg-blue-600 hover:bg-blue-700 text-white rounded-2xl text-lg font-bold shadow-xl shadow-blue-100 transition-all active:scale-[0.98]">
                바로 시작하기
            </button>
        </div>

        <div id="secondary-cta-container" class="flex flex-col items-center gap-4">
            <button id="btn-login" class="text-slate-500 font-semibold text-[15px] hover:text-slate-800 transition-colors">
                이미 계정이 있나요? <span class="text-blue-600 ml-1">로그인</span>
            </button>
            
            <div id="reassurance-text" class="bg-slate-50 px-4 py-3 rounded-xl border border-slate-100">
                <p class="text-[12px] text-slate-400 text-center leading-tight">
                    <i class="fa-solid fa-circle-info mr-1 text-slate-300"></i>
                    가입하지 않아도 시작할 수 있어요.<br/>
                    나중에 가입하면 학습 기록이 그대로 이어져요.
                </p>
            </div>
        </div>
    </div>
</div>
</div>

</html>
