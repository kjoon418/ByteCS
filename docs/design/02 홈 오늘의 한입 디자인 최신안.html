<html>
        <head>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
            <style> * { font-family: 'Pretendard', sans-serif; } </style>
        </head>

        
<div class="ui-screen">
    <div id="app" class="relative w-[390px] min-min-h-[840px] bg-[#F8FAFC] flex flex-col">
    <!-- Header Section -->
    <header id="header" class="px-6 pt-12 pb-6">
        <div class="flex justify-between items-center mb-2">
            <span class="text-[#64748B] text-sm font-medium">2026.05.14</span>
            <div id="account-entry" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-slate-100">
                <img src="https://vinsign.app/resources/avatars/avatar-5.png" alt="Profile" class="w-8 h-8 rounded-full">
            </div>
        </div>
        <h1 class="text-2xl font-bold text-[#1E293B] leading-tight">
            안녕하세요!<br>
            오늘도 <span class="text-[#3B82F6]">한입</span> 해볼까요?
        </h1>
    </header>

    <!-- Streak Section -->
    <section id="streak-card" class="px-6 mb-6">
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
            <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-fire text-orange-500 text-xl"></i>
            </div>
            <div>
                <p class="text-[#1E293B] font-bold text-lg">3일째 꾸준히 한입!</p>
                <p class="text-[#64748B] text-sm">내일도 오시면 4일 연속이에요.</p>
            </div>
        </div>
    </section>

    <!-- Main Session Card -->
    <main id="main-session" class="px-6 mb-8">
        <div class="bg-white rounded-[32px] p-8 shadow-xl shadow-blue-900/5 border border-slate-50 relative overflow-hidden">
            <!-- Background Accent -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-50 rounded-full blur-3xl opacity-60"></div>
            
            <div class="relative z-10">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <span class="inline-block px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-full mb-3">오늘의 세션</span>
                        <h2 class="text-xl font-extrabold text-[#1E293B]">이어서 풀기</h2>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black text-[#1E293B]">2</span>
                        <span class="text-[#94A3B8] font-bold"> / 5</span>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="w-full h-3 bg-slate-100 rounded-full mb-8 overflow-hidden">
                    <div class="w-[40%] h-full bg-blue-500 rounded-full shadow-[0_0_12px_rgba(59,130,246,0.4)]"></div>
                </div>

                <!-- Primary CTA -->
                <button id="cta-continue" class="w-full bg-[#1E293B] text-white py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
                    <span>학습 이어서 하기</span>
                    <i class="fa-solid fa-chevron-right text-sm"></i>
                </button>

                <!-- Review Hint -->
                <div class="mt-6 flex items-center justify-center gap-2 text-[#64748B]">
                    <i class="fa-solid fa-sparkles text-amber-400 text-xs"></i>
                    <p class="text-xs font-medium">오늘은 복습 문제도 한 스푼 섞여있어요</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Secondary Actions -->
    <section id="secondary-actions" class="px-6 space-y-4 mb-10">
        <button id="scrap-list" class="w-full bg-white border border-slate-200 p-5 rounded-2xl flex items-center justify-between active:bg-slate-50">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-bookmark text-slate-500"></i>
                </div>
                <span class="font-bold text-[#334155]">내가 아껴둔 문제들</span>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-300 text-sm"></i>
        </button>

        <!-- Guest Banner (Nudge) -->
        <div id="guest-nudge" class="bg-blue-50/50 border border-dashed border-blue-200 p-5 rounded-2xl flex items-center gap-4">
            <div class="flex-1">
                <p class="text-sm font-bold text-blue-800 mb-1">기록을 안전하게 지키세요</p>
                <p class="text-xs text-blue-600/80 leading-relaxed">회원가입을 하면 학습 데이터와 스트릭이 안전하게 저장됩니다.</p>
            </div>
            <button class="px-4 py-2 bg-white text-blue-600 text-xs font-bold rounded-lg border border-blue-100 shadow-sm whitespace-nowrap">가입하기</button>
        </div>
    </section>

    <!-- Spacer to push content up if needed -->
    <div class="flex-grow"></div>

    <!-- Bottom Navigation Bar -->
    <nav id="bottomTabBar" class="bg-white border-t border-slate-100 px-8 py-4 flex justify-around items-center">
        <div class="flex flex-col items-center gap-1">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-house text-xl"></i>
            </div>
            <span class="text-xs font-bold text-blue-600">홈</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <div class="w-12 h-12 flex items-center justify-center">
                <i class="fa-solid fa-chart-simple text-xl text-slate-600"></i>
            </div>
            <span class="text-xs font-medium text-slate-600">통계</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <div class="w-12 h-12 flex items-center justify-center">
                <i class="fa-solid fa-user text-xl text-slate-600"></i>
            </div>
            <span class="text-xs font-medium text-slate-600">계정</span>
        </div>
    </nav>
</div>
</div>

</html>
